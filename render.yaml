services:
  # FastAPI Backend
  - type: web
    name: nail-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "false"
      - key: MYSQL_HOST
        fromDatabase:
          name: nail-db
          property: host
      - key: MYSQL_PORT
        fromDatabase:
          name: nail-db
          property: port
      - key: MYSQL_USER
        fromDatabase:
          name: nail-db
          property: user
      - key: MYSQL_PASSWORD
        fromDatabase:
          name: nail-db
          property: password
      - key: MYSQL_DATABASE
        fromDatabase:
          name: nail-db
          property: database
      - key: REDIS_URL
        fromService:
          type: redis
          name: nail-redis
          property: connectionString
      - key: FRONTEND_URL
        sync: false   # Set manually to your frontend URL
      - key: ASAAS_API_KEY
        sync: false
      - key: ASAAS_ENVIRONMENT
        value: production
      - key: ASAAS_WEBHOOK_TOKEN
        generateValue: true
      - key: ZAPI_INSTANCE_ID
        sync: false
      - key: ZAPI_TOKEN
        sync: false
      - key: ZAPI_CLIENT_TOKEN
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: EMAIL_FROM_NAME
        value: "Nail Studio"
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false

  # Celery Worker
  - type: worker
    name: nail-worker
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    dockerCommand: celery -A app.tasks.celery_app worker --loglevel=info
    plan: free
    envVars:
      - fromGroup: nail-backend

  # Frontend (Static Site)
  - type: web
    name: nail-frontend
    runtime: static
    staticPublishPath: ./frontend/dist
    buildCommand: cd frontend && npm ci && npm run build
    plan: free
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: nail-db
    plan: free

  - name: nail-redis
    type: redis
    plan: free
