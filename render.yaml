services:
  # FastAPI Backend
  - type: web
    name: nail-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "false"
      - key: DATABASE_URL
        fromDatabase:
          name: nail-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: nail-redis
          property: connectionString
      - key: FRONTEND_URL
        sync: false
      - key: ASAAS_API_KEY
        sync: false
      - key: ASAAS_ENVIRONMENT
        value: sandbox
      - key: ASAAS_WEBHOOK_TOKEN
        generateValue: true
      - key: ZAPI_API_URL
        value: "https://api.z-api.io"
      - key: ZAPI_INSTANCE_ID
        sync: false
      - key: ZAPI_TOKEN
        sync: false
      - key: ZAPI_CLIENT_TOKEN
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: EMAIL_FROM_NAME
        value: "Nail Studio"
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false

  # Celery Worker
  - type: worker
    name: nail-worker
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    dockerCommand: celery -A app.tasks.celery_app worker --loglevel=info
    plan: free
    envVars:
      - key: SECRET_KEY
        fromService:
          type: web
          name: nail-backend
          envVarKey: SECRET_KEY
      - key: DATABASE_URL
        fromDatabase:
          name: nail-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: nail-redis
          property: connectionString
      - key: ASAAS_API_KEY
        fromService:
          type: web
          name: nail-backend
          envVarKey: ASAAS_API_KEY
      - key: ASAAS_ENVIRONMENT
        value: sandbox
      - key: ASAAS_WEBHOOK_TOKEN
        fromService:
          type: web
          name: nail-backend
          envVarKey: ASAAS_WEBHOOK_TOKEN
      - key: ZAPI_API_URL
        value: "https://api.z-api.io"
      - key: ZAPI_INSTANCE_ID
        fromService:
          type: web
          name: nail-backend
          envVarKey: ZAPI_INSTANCE_ID
      - key: ZAPI_TOKEN
        fromService:
          type: web
          name: nail-backend
          envVarKey: ZAPI_TOKEN
      - key: ZAPI_CLIENT_TOKEN
        fromService:
          type: web
          name: nail-backend
          envVarKey: ZAPI_CLIENT_TOKEN
      - key: RESEND_API_KEY
        fromService:
          type: web
          name: nail-backend
          envVarKey: RESEND_API_KEY
      - key: EMAIL_FROM
        fromService:
          type: web
          name: nail-backend
          envVarKey: EMAIL_FROM
      - key: EMAIL_FROM_NAME
        value: "Nail Studio"
      - key: FRONTEND_URL
        fromService:
          type: web
          name: nail-backend
          envVarKey: FRONTEND_URL

  # Frontend (Static Site)
  - type: web
    name: nail-frontend
    runtime: static
    staticPublishPath: ./frontend/dist
    buildCommand: cd frontend && npm ci && npm run build
    plan: free
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: nail-db
    databaseName: nail_booking
    plan: free

  - name: nail-redis
    type: redis
    plan: free
